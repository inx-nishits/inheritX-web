<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Account Deletion - Rise 2 Shine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-soft: #eef2ff;
            --accent: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 60px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo span {
            color: var(--accent);
        }

        h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        p {
            margin-bottom: 16px;
            font-size: 18px;
            color: var(--text-main);
            font-weight: 500;
            text-align: center;
        }

        .contact-card {
            background: #f1f5f9;
            padding: 24px;
            border-radius: 20px;
            margin: 30px 0;
            text-align: center;
        }

        .contact-item {
            display: block;
            margin: 10px 0;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 24px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 10px;
            }

            .container {
                padding: 30px 20px;
                border-radius: 24px;
            }

            h2 {
                font-size: 20px;
            }

            .contact-item {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">Rise 2 <span>Shine</span></div>
        </header>

        <main class="content">
            <section>
                <h2>Request Account Deletion</h2>
                <p>
                    To delete your account and all associated data, please send an email to:
                </p>

                <div class="contact-card">
                    <a href="mailto:support@inheritx.com" class="contact-item">support@inheritx.com</a>
                </div>

                <p>
                    Include the email address you used to sign up.
                </p>
                <p style="font-weight: 700; color: var(--accent);">
                    Your data will be permanently deleted within 48 hours.
                </p>
            </section>
        </main>
    </div>

    <footer>
        &copy; 2026 Inheritx Solutions. All rights reserved.
    </footer>
</body>

</html>
